<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Gateway - Model Groups</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
    <link rel="stylesheet" href="/admin/static/css/style.css">
    <style>
        [v-cloak] {
            display: none !important;
        }
    </style>
    <!-- Load Vue 3 Global Build -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script type="module" src="/admin/static/js/app.js"></script>
</head>

<body>
    <div id="app" v-cloak>
        <div class="app-container">
            <nav class="sidebar glass-panel">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <h2>Orion<span>Gateway</span></h2>
                </div>
                <ul class="nav-links">
                    <template v-for="tab in tabs" :key="tab.id">
                        <li :data-tab="tab.id" :class="{ active: activeTab === tab.id }" @click="setTab(tab.id)">
                            <i :class="['lucide-' + tab.icon, 'icon']"></i>
                            <span v-text="tab.label"></span>
                        </li>
                    </template>
                </ul>
            </nav>

            <main class="content-area">
                <section id="groups" class="tab-content active">

                    <header>
                        <div class="header-titles">
                            <h1>Model Groups</h1>
                            <p>Create fallback chains from registered models</p>
                        </div>
                        <button class="primary-btn glow-effect plus-btn" @click="showAddGroupModal = true">+ Create Group</button>
                    </header>
                    <div class="group-list">
                        <template v-for="group in groups" :key="group.id">
                            <div class="glass-panel group-card">
                                <div class="group-card-header" style="margin-bottom: 1.25rem;">
                                    <div class="group-card-title-section"
                                        style="display: flex; align-items: center; gap: 10px; width: 100%;">
                                        <span class="badge badge-capability" v-text="group.capability"></span>
                                        <h3 v-text="group.name" style="margin: 0;"></h3>
                                        <span class="badge" :class="group.is_active ? 'active' : 'inactive'"
                                            v-text="group.is_active ? 'Active' : 'Inactive'"></span>
                                        <div style="display: flex; gap: 8px; margin-left: auto; align-items: center;">
                                            <button class="primary-btn glow-effect plus-btn" @click="openAddGroupItem(group)" title="Add Model to Group">+ Add Model</button>
                                            <button class="secondary-btn" @click="openEditGroup(group)" title="Edit Group">Edit</button>
                                        </div>
                                    </div>
                                </div>

                                <transition-group name="list" tag="div" class="group-items"
                                    style="display: flex; flex-direction: column; gap: 8px;">
                                    <div v-for="(item, index) in group.items" :key="item.id" class="group-item-row"
                                        :data-group-id="group.id"
                                        style="background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 6px; padding: 0 16px; min-height: 52px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease;">

                                        <div
                                            style="display: flex; align-items: center; gap: 12px; flex: 1; pointer-events: none;">
                                            <span
                                                style="display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.25); border-radius: 50%; color: #c084fc; font-size: 11px; font-weight: 700;"
                                                v-text="index + 1"></span>
                                            <span style="font-weight: 500;"
                                                v-text="item.name + ' (' + item.provider + ')'"></span>
                                        </div>

                                        <!-- Drag Handle — Pointer Events only, no HTML5 drag API -->
                                        <div class="drag-handle"
                                            @pointerdown.prevent="pointerDragStart(group, index, $event)"
                                            style="width: 40px; height: 52px; display: flex; align-items: center; justify-content: center; margin: 0 8px; flex-shrink: 0;"
                                            title="Drag to reorder">
                                            <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"
                                                style="pointer-events: none; display: block;">
                                                <rect y="0" width="16" height="2" rx="1" />
                                                <rect y="5" width="16" height="2" rx="1" />
                                                <rect y="10" width="16" height="2" rx="1" />
                                            </svg>
                                        </div>

                                        <div class="row-actions" style="display: flex; gap: 4px;">
                                            <button class="secondary-btn" @click="moveGroupItem(group, index, -1)"
                                                :disabled="index === 0" style="padding: 4px 8px; font-size: 12px;"
                                                title="Move Up">
                                                <i class="lucide-chevron-up"></i>
                                            </button>
                                            <button class="secondary-btn" @click="moveGroupItem(group, index, 1)"
                                                :disabled="index === group.items.length - 1"
                                                style="padding: 4px 8px; font-size: 12px;" title="Move Down">
                                                <i class="lucide-chevron-down"></i>
                                            </button>
                                            <button class="danger-btn" @click="deleteGroupItem(group, item.id)"
                                                style="padding: 4px 8px; font-size: 12px;" title="Remove from Group">
                                                <i class="lucide-trash-2"></i>
                                            </button>
                                        </div>
                                    </div>
                                </transition-group>
                            </div>
                        </template>
                    </div>
                </section>
            </main>
        </div>

        <!-- Global Admin Login Modal -->
        <div class="modal-overlay" :class="{ show: showLogin }">
            <div class="modal glass-panel">
                <h2>Admin Authentication</h2>
                <p>Please enter the admin secret to access gateway settings.</p>
                <div class="input-group" style="margin-top: 1rem;">
                    <input type="password" v-model="adminKeyInput" @keydown.enter="login()" placeholder="Admin key">
                </div>
                <div class="state-box error" v-show="loginError" v-text="loginError"></div>
                <div class="modal-actions">
                    <button class="primary-btn glow-effect" style="width: 100%;" @click="login()">Unlock</button>
                </div>
            </div>
        </div>

        <!-- Add Group Modal -->
        <div class="modal-overlay" :class="{ show: showAddGroupModal }">
            <div class="modal glass-panel">
                <h2>Create Model Group</h2>
                <form @submit.prevent="createGroup()">
                    <div class="input-group">
                        <label>Group Name</label>
                        <input v-model.trim="groupForm.name" required placeholder="e.g. fast-chat-group">
                    </div>
                    <div class="input-group">
                        <label>Capability</label>
                        <div class="custom-select-wrapper">
                            <select v-model="groupForm.capability">
                                <option value="chat">chat</option>
                                <option value="tts">tts</option>
                                <option value="embed">embed</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-actions" style="margin-top: 1.5rem;">
                        <button class="secondary-btn" type="button" @click="showAddGroupModal = false">Cancel</button>
                        <button class="primary-btn glow-effect" type="submit">Create Group</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Group Modal -->
        <div class="modal-overlay" :class="{ show: showEditGroupModal }">
            <div class="modal glass-panel">
                <h2>Edit Model Group</h2>
                <form @submit.prevent="updateGroup(editingGroup)">
                    <div class="input-group">
                        <label>Group Name</label>
                        <input v-model.trim="editingGroup.name" required placeholder="e.g. fast-chat-group">
                    </div>
                    <div class="input-group">
                        <label>Capability</label>
                        <div class="custom-select-wrapper">
                            <select v-model="editingGroup.capability" disabled>
                                <option value="chat">chat</option>
                                <option value="tts">tts</option>
                                <option value="embed">embed</option>
                            </select>
                        </div>
                    </div>
                    <label class="active-toggle-box" :class="{ 'is-active': editingGroup.is_active }"
                        style="margin-top: 1rem;">
                        <input type="checkbox" v-model="editingGroup.is_active">
                        <div class="toggle-label">
                            <span class="title">Active Status</span>
                            <span class="subtitle">Enable group for routing</span>
                        </div>
                    </label>
                    <div class="modal-actions"
                        style="margin-top: 1.5rem; display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <button class="danger-btn" type="button" @click="deleteGroup(editingGroup.id)">Delete</button>
                        <div style="display: flex; gap: 12px;">
                            <button class="secondary-btn" type="button"
                                @click="showEditGroupModal = false">Cancel</button>
                            <button class="primary-btn glow-effect" type="submit">Save Changes</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Add Group Item Modal -->
        <div class="modal-overlay" :class="{ show: showAddGroupItemModal }">
            <div class="modal glass-panel">
                <h2>Add Model to Group</h2>
                <form @submit.prevent="addGroupItem()">
                    <div class="input-group">
                        <label>Select Model</label>
                        <div class="custom-select-wrapper">
                            <select v-model="editingGroupItem.model_id" required>
                                <option value="">-- Choose a model --</option>
                                <template
                                    v-for="model in (activeGroupForItems ? modelsByCapability(activeGroupForItems.capability) : [])"
                                    :key="model.id">
                                    <option :value="model.id" v-text="model.name + ' (' + model.provider + ')'">
                                    </option>
                                </template>
                            </select>
                        </div>
                    </div>
                    <div class="modal-actions" style="margin-top: 1.5rem;">
                        <button class="secondary-btn" type="button"
                            @click="showAddGroupItemModal = false">Cancel</button>
                        <button class="primary-btn glow-effect" type="submit">Add Model</button>
                    </div>
                </form>
            </div>
        </div>
        <!-- Global Confirm Modal -->
        <div class="modal-overlay" :class="{ show: confirmDialog.show }">
            <div class="modal glass-panel" style="max-width: 400px; text-align: center;">
                <div style="font-size: 48px; color: var(--error); margin-bottom: 1rem;"><i
                        class="lucide-alert-triangle"></i></div>
                <h2 style="margin-bottom: 0.5rem;">Are you sure?</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;" v-text="confirmDialog.message"></p>
                <div class="modal-actions" style="justify-content: center; gap: 1rem;">
                    <button class="secondary-btn" @click="cancelConfirm()">Cancel</button>
                    <button class="danger-btn" @click="executeConfirm()">Yes, Proceed</button>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container">
            <transition-group name="toast">
                <div v-for="toast in toasts" :key="toast.id" class="toast" :class="'toast-' + toast.type">
                    <i :class="toast.type === 'error' ? 'lucide-alert-circle' : 'lucide-check-circle'"></i>
                    <div class="toast-content" v-text="toast.message"></div>
                    <button class="toast-close" @click="removeToast(toast.id)"><i class="lucide-x"></i></button>
                </div>
            </transition-group>
        </div>
    </div>
</body>

</html>
