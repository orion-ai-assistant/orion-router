<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion AI Gateway - Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@latest/font/lucide.css">
    <link rel="stylesheet" href="/admin/static/css/style.css">
    <style>
        [v-cloak] {
            display: none !important;
        }
    </style>
    <!-- Load Vue 3 Global Build -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script type="module" src="/admin/static/js/app.js"></script>
</head>

<body>
    <div id="app" v-cloak>
        <div class="app-container">
            <nav class="sidebar glass-panel">
                <div class="logo">
                    <div class="logo-icon"></div>
                    <h2>Orion<span>Gateway</span></h2>
                </div>
                <ul class="nav-links">
                    <template v-for="tab in tabs" :key="tab.id">
                        <li :data-tab="tab.id" :class="{ active: activeTab === tab.id }" @click="setTab(tab.id)">
                            <i :class="['lucide-' + tab.icon, 'icon']"></i>
                            <span v-text="tab.label"></span>
                        </li>
                    </template>
                </ul>
            </nav>

            <main class="content-area">
                <section id="settings" class="tab-content active">

                    <header>
                        <div class="header-titles">
                            <h1>Settings</h1>
                            <p>Manage gateway configurations</p>
                        </div>
                    </header>
                    <div class="glass-panel" style="padding: 2rem;">
                        <h2 style="margin-bottom: 0.5rem;">Admin Authentication</h2>
                        <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Change the admin secret used to access this dashboard.</p>
                        
                        <div class="input-group" style="max-width: 400px;">
                            <label>New Admin Secret</label>
                            <input type="password" v-model="settingsForm.adminSecret" placeholder="Enter new secret">
                        </div>
                        <div style="margin-top: 1rem;">
                            <button class="primary-btn glow-effect" @click="saveSettings()">Save Changes</button>
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <!-- Global Admin Login Modal -->
        <div class="modal-overlay" :class="{ show: showLogin }">
            <div class="modal glass-panel">
                <h2>Admin Authentication</h2>
                <p>Please enter the admin secret to access gateway settings. <br><small v-if="isDefaultPassword" style="color: var(--text-secondary); margin-top: 0.5rem; display: block;">Default password is <strong>orion-admin</strong>. You can change it later in settings.</small></p>
                <div class="input-group" style="margin-top: 1rem;">
                    <input type="password" v-model="adminKeyInput" @keydown.enter="login()" placeholder="Admin key">
                </div>
                <div class="state-box error" v-show="loginError" v-text="loginError"></div>
                <div class="modal-actions">
                    <button class="primary-btn glow-effect" style="width: 100%;" @click="login()">Unlock</button>
                </div>
            </div>
        </div>

        <!-- Global Confirm Modal -->
        <div class="modal-overlay" :class="{ show: confirmDialog.show }">
            <div class="modal glass-panel" style="max-width: 400px; text-align: center;">
                <div style="font-size: 48px; color: var(--error); margin-bottom: 1rem;"><i class="lucide-alert-triangle"></i></div>
                <h2 style="margin-bottom: 0.5rem;">Are you sure?</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;" v-text="confirmDialog.message"></p>
                <div class="modal-actions" style="justify-content: center; gap: 1rem;">
                    <button class="secondary-btn" @click="cancelConfirm()">Cancel</button>
                    <button class="danger-btn" @click="executeConfirm()">Yes, Proceed</button>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container">
            <transition-group name="toast">
                <div v-for="toast in toasts" :key="toast.id" class="toast" :class="'toast-' + toast.type">
                    <i :class="toast.type === 'error' ? 'lucide-alert-circle' : 'lucide-check-circle'"></i>
                    <div class="toast-content" v-text="toast.message"></div>
                    <button class="toast-close" @click="removeToast(toast.id)"><i class="lucide-x"></i></button>
                </div>
            </transition-group>
        </div>
    </div>
</body>

</html>
