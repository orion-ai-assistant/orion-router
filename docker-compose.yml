services:
  router:
    image: orion-router:latest
    build:
      context: .
    container_name: router
    restart: unless-stopped
    ports:
      - "${ROUTER_PORT:-20128}:${ROUTER_PORT:-20128}"
    environment:
      - POSTGRES_HOST=router-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=orion_router
      - POSTGRES_USER=router_user
      - POSTGRES_PASSWORD=router_pass
      - LLM_HOST=llama-cpp
      - EMBED_HOST=llama-cpp-embed
      - TTS_HOST=tts
    env_file:
      - path: .env
        required: false
    networks:
      - orion-network
    depends_on:
      router-db:
        condition: service_healthy

  router-db:
    image: postgres:16-alpine
    container_name: router-db
    restart: unless-stopped
    networks:
      - orion-network
    environment:
      POSTGRES_DB: orion_router
      POSTGRES_USER: router_user
      POSTGRES_PASSWORD: router_pass
    ports:
      - "5433:5432" # Host'taki diğer postgres (5432) ile çakışmaması için 5433 portundan açılır.
    volumes:
      - router_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U router_user -d orion_router"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  router_postgres_data:

networks:
  orion-network:
    name: orion-network
    external: true
